<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Ticket System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1f4037, #99f2c8);
}

.login-container {
  background: white;
  width: 380px;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-container h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #2c3e50;
}

.input-group {
  margin-bottom: 20px;
  position: relative;
}

.input-group input {
  width: 100%;
  padding: 12px 40px 12px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
  transition: 0.3s;
}

.input-group input:focus {
  border-color: #1abc9c;
  box-shadow: 0 0 10px rgba(26,188,156,0.3);
  outline: none;
}

.input-group span {
  position: absolute;
  right: 12px;
  top: 12px;
  font-size: 14px;
  color: #888;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #1abc9c;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a085;
}

#result {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  min-height: 20px;
}

.success { color: green; }
.error { color: red; }
</style>
</head>

<body>

<div class="login-container">
  <h2>Ticket Management System</h2>

  <form id="loginForm">
    <div class="input-group">
      <input id="username" placeholder="Username" autofocus>
      <span aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 21V19.5C20 18.1193 18.8807 17 17.5 17H6.5C5.11929 17 4 18.1193 4 19.5V21" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 13C14.7614 13 17 10.7614 17 8C17 5.23858 14.7614 3 12 3C9.23858 3 7 5.23858 7 8C7 10.7614 9.23858 13 12 13Z" stroke="#6B7280" stroke-width="2"/>
        </svg>
      </span>
    </div>

    <div class="input-group">
      <input id="password" type="password" placeholder="Password">
      <span aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 11V7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7V11" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 11H4V22H20V11Z" stroke="#6B7280" stroke-width="2"/>
          <path d="M12 17V17.01" stroke="#6B7280" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </span>
    </div>


    <button type="submit">Login</button>
  </form>

  <div id="result"></div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const result = document.getElementById("result");

  if (!username || !password) {
    result.className = "error";
    result.innerText = "Please enter both username and password.";
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      result.className = "error";
      result.innerText = data.message || "Invalid credentials.";
      return;
    }

    localStorage.clear();
    localStorage.setItem("role", data.role);

    if (data.role === "operator") {
      localStorage.setItem("operatorName", username);
      result.className = "success";
      result.innerText = "Operator login successful! Redirecting...";
      setTimeout(() => {
        window.location.href = "operatorDashboard.html";
      }, 800);
    } 
    else if (data.role === "admin") {
      result.className = "success";
      result.innerText = "Admin login successful! Redirecting...";
      setTimeout(() => {
        window.location.href = "adminDashboard.html";
      }, 800);
    }

  } catch (err) {
    result.className = "error";
    result.innerText = "Server error. Please try again.";
  }
});
</script>

</body>
</html>
