<!DOCTYPE html>
<html>
<head>
<title>Operators</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    background: #1f2937;
    color: white;
    height: 100vh;
    padding: 20px;
    position: fixed;
    transition: transform 0.4s ease;
}

.sidebar.collapsed {
    transform: translateX(-100%);
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 40px;
}

.sidebar a {
    display: block;
    color: #d1d5db;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    text-decoration: none;
    transition: all 0.3s ease;
}

.sidebar a:hover {
    background: #374151;
    transform: translateX(5px);
}

/* MAIN */
.main {
    flex: 1;
    margin-left: 0;
    padding: 30px 40px;
    transition: margin-left 0.4s ease;
}

.main.full {
    margin-left: 230px;
}

/* TOPBAR */
.topbar {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
}

.menu-btn {
    background: #1f2937;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.menu-btn:hover {
    background: #111827;
    transform: scale(1.05);
}

/* CARDS */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

/* STATS */
.stats {
    display: flex;
    gap: 20px;
}

.stats .card {
    flex: 1;
    text-align: center;
}

/* INPUTS */
input, select {
    padding: 8px;
    margin: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 5px rgba(59,130,246,0.5);
    outline: none;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #eee;
}

th {
    background: #f9fafb;
}

tr {
    transition: 0.2s;
}

tr:hover {
    background: #f1f5f9;
}

/* BUTTONS */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

.add {
    background: green;
    color: white;
}

.add:hover {
    background: #16a34a;
    transform: scale(1.05);
}

.delete {
    background: red;
    color: white;
}

.delete:hover {
    background: #dc2626;
    transform: scale(1.05);
}

.logout-btn {
    color: #f87171 !important;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar collapsed" id="sidebar">
    <h2>Support Admin</h2>
    <a href="adminDashboard.html">Dashboard</a>
    <a href="tickets.html">Tickets</a>
    <a href="operators.html">Operators</a>
    <a href="settings.html">Settings</a>
    <hr>
    <a href="#" onclick="logout()" class="logout-btn">Logout</a>
</div>

<!-- MAIN -->
<div class="main" id="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰ Menu</button>
        <h1>Operators Management</h1>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="card">
            <h4>Total Operators</h4>
            <h2 id="totalOps">0</h2>
        </div>

        <div class="card">
            <h4>Admins</h4>
            <h2 id="adminOps">0</h2>
        </div>

        <div class="card">
            <h4>Support Staff</h4>
            <h2 id="supportOps">0</h2>
        </div>
    </div>

    <!-- ADD -->
    <div class="card">
        <h3>Add Operator</h3>

        <input id="name" placeholder="Operator Name">
        <select id="role">
            <option value="Support">Support</option>
            <option value="Admin">Admin</option>
        </select>

        <button class="add" onclick="addOperator()">Add</button>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h3>Operator List</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="operatorList"></tbody>
        </table>
    </div>

</div>

<script>
let operators = JSON.parse(localStorage.getItem("operators")) || [
    { name: "John", role: "Support" },
    { name: "Raj", role: "Admin" }
];

// ADD
function addOperator() {
    let name = document.getElementById("name").value.trim();
    let role = document.getElementById("role").value;

    if (name === "") {
        alert("Enter name");
        return;
    }

    operators.push({ name, role });
    localStorage.setItem("operators", JSON.stringify(operators));

    document.getElementById("name").value = "";

    displayOperators();
}

// DISPLAY
function displayOperators() {
    let output = "";

    let total = operators.length;
    let admins = operators.filter(op => op.role === "Admin").length;
    let support = operators.filter(op => op.role === "Support").length;

    document.getElementById("totalOps").innerText = total;
    document.getElementById("adminOps").innerText = admins;
    document.getElementById("supportOps").innerText = support;

    if (operators.length === 0) {
        output = `<tr><td colspan="4" style="text-align:center;">No operators</td></tr>`;
    } else {
        operators.forEach((op, index) => {
            output += `
            <tr>
                <td>${index + 1}</td>
                <td>${op.name}</td>
                <td>${op.role}</td>
                <td>
                    <button class="delete" onclick="deleteOperator(${index})">Delete</button>
                </td>
            </tr>
            `;
        });
    }

    document.getElementById("operatorList").innerHTML = output;
}

// DELETE
function deleteOperator(index) {
    if (!confirm("Delete operator?")) return;

    operators.splice(index, 1);
    localStorage.setItem("operators", JSON.stringify(operators));

    displayOperators();
}

// SIDEBAR
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main").classList.toggle("full");
}

// LOGOUT
function logout() {
    window.location.href = "role.html";
}

// LOAD
displayOperators();
</script>

</body>
</html>
