<!DOCTYPE html>
<html>
<head>
    <title>Role | Ticket System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
            color: gray;
        }

        .cards {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .card {
            flex: 1;
            padding: 25px;
            border-radius: 15px;
            background: #f4f6f9;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #2c3e50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .card span {
            font-size: 45px;
            display: block;
            margin-bottom: 15px;
        }

        .card h3 {
            margin: 0;
            font-size: 16px;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Automated Support System</h2>
    <p>Select Your Role</p>

    <div class="cards">

        <div class="card" onclick="goToLogin('admin')">
            <span aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14.5 6.5L17.5 3.5C18.1 2.9 19.1 2.9 19.7 3.5C20.3 4.1 20.3 5.1 19.7 5.7L16.7 8.7" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 10L14 12" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
                <path d="M10 12L7 15C5.3 16.7 5.3 19.4 7 21.1C8.7 22.8 11.4 22.8 13.1 21.1L16 18" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
                <path d="M9 15L11 17" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>

            <h3>Admin Login</h3>
        </div>

        <div class="card" onclick="goToLogin('operator')">
            <span aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 9C10 7.34315 11.3431 6 13 6C14.6569 6 16 7.34315 16 9C16 10.6569 14.6569 12 13 12C11.3431 12 10 10.6569 10 9Z" stroke="#111827" stroke-width="2"/>
                <path d="M8 21L10 14H16L18 21" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M5 7L3 9" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
                <path d="M9 7L11 9" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>

            <h3>Operator Login</h3>
        </div>

        <div class="card" onclick="goToTicket()">
            <span aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 10V7C3 5.89543 3.89543 5 5 5H19C20.1046 5 21 5.89543 21 7V10C19.8954 10 19 10.8954 19 12C19 13.1046 19.8954 14 21 14V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V14C4.10457 14 5 13.1046 5 12C5 10.8954 4.10457 10 3 10Z" stroke="#111827" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 9V15" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>

            <h3>Raise Ticket</h3>
        </div>

    </div>

    <div class="footer">
        © 2026 Automated Support System
    </div>
</div>

<script>
function goToLogin(role) {
    window.location.href = "login.html?role=" + role;
}

function goToTicket() {
    window.location.href = "createTicket.html";
}
</script>

</body>
</html>
