<!DOCTYPE html>
<html>
<head>
<title>My Tickets</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    background: #1f2937;
    color: white;
    height: 100vh;
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    transition: transform 0.3s ease;
}

.sidebar.collapsed {
    transform: translateX(-100%);
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: #d1d5db;
    text-decoration: none;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
}

.sidebar a:hover {
    background: #374151;
    color: white;
}

.logout-btn {
    color: #f87171 !important;
}

/* MAIN */
.main {
    padding: 30px 40px;
    transition: margin-left 0.3s ease;
}

.main.full {
    margin-left: 230px;
}

/* TOPBAR */
.topbar {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
}

.menu-btn {
    background: #1f2937;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    margin-bottom: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* SEARCH */
input {
    width: 300px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 14px;
    border-bottom: 1px solid #eee;
    text-align: left;
}

th {
    background: #f3f4f6;
    font-weight: 600;
}

tr:hover {
    background: #f9fafb;
}

/* PRIORITY */
.priority {
    padding: 5px 10px;
    border-radius: 20px;
    color: white;
    font-size: 12px;
}

.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #10b981; }

/* STATUS */
.status {
    font-weight: 500;
}

.closed { color: #10b981; }
.inprogress { color: #f59e0b; }
.assigned { color: #3b82f6; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar collapsed" id="sidebar">
    <h2>Operator</h2>
    <a href="operatorDashboard.html">Dashboard</a>
    <a href="myTickets.html">My Tickets</a>
    <hr>
    <a href="#" onclick="logout()" class="logout-btn">Logout</a>
</div>

<div class="main" id="mainContent">

    <!-- TOP -->
    <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰ Menu</button>
        <h1>My Tickets</h1>
    </div>

    <!-- SEARCH -->
    <div class="card">
        <h3>Search Tickets</h3>
        <input 
            id="searchInput" 
            placeholder="Search by title, description or status..."
            onkeyup="searchTickets()"
        >
    </div>

    <!-- TABLE -->
    <div class="card">
        <h3>My Tickets</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Priority</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ticketList"></tbody>
        </table>
    </div>

</div>

<script>
let tickets = [];

// TOGGLE SIDEBAR
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("mainContent").classList.toggle("full");
}

// LOGOUT
function logout() {
    window.location.href = "role.html";
}

// LOAD FROM BACKEND
function loadTickets() {
    fetch("/api/tickets")
        .then(res => res.json())
        .then(data => {
            tickets = data;
            renderTickets(tickets);
        });
}

// SEARCH
function searchTickets() {
    let keyword = document.getElementById("searchInput").value.toLowerCase();

    let filtered = tickets.filter(t =>
        (t.title && t.title.toLowerCase().includes(keyword)) ||
        (t.description && t.description.toLowerCase().includes(keyword)) ||
        (t.status && t.status.toLowerCase().includes(keyword))
    );

    renderTickets(filtered);
}

// RENDER
function renderTickets(data) {
    let output = "";

    if (data.length === 0) {
        output = `<tr><td colspan="5" style="text-align:center;">No tickets found</td></tr>`;
    } else {
        data.forEach(ticket => {

            let priorityClass = (ticket.priority || "low").toLowerCase();

            let statusClass = "";
            if (ticket.status === "Closed") statusClass = "closed";
            else if (ticket.status === "In Progress") statusClass = "inprogress";
            else statusClass = "assigned";

            output += `
            <tr>
                <td>${ticket.id}</td>
                <td>${ticket.title}</td>
                <td>${ticket.description || "-"}</td>
                <td><span class="priority ${priorityClass}">${ticket.priority || "Low"}</span></td>
                <td class="status ${statusClass}">${ticket.status}</td>
            </tr>
            `;
        });
    }

    document.getElementById("ticketList").innerHTML = output;
}

// INIT
loadTickets();
</script>

</body>
</html>
